<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.item {
  background: #fff;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.item img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}

.info {
  flex: 1;
}

.price {
  color: #ee4d2d;
  font-weight: bold;
}

.total {
  text-align: right;
  font-size: 20px;
  font-weight: bold;
  margin-top: 20px;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  background: #ee4d2d;
  color: #fff;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
}

.btn:hover {
  background: #d63d22;
}
</style>
</head>

<body>

<div class="container">
  <h2>💳 Thanh toán đơn hàng</h2>

  <div id="list"></div>

  <div class="total" id="total"></div>

  <button class="btn" onclick="placeOrder()">
    🛒 Đặt hàng ngay
  </button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render() {
  const box = document.getElementById("list");
  const totalBox = document.getElementById("total");

  box.innerHTML = "";

  if (cart.length === 0) {
    box.innerHTML = "Giỏ hàng trống";
    totalBox.innerHTML = "";
    return;
  }

  let total = 0;

  cart.forEach(p => {
    total += p.price * (p.qty || 1);

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">

        <div class="info">
          <h4>${p.name}</h4>
          <div class="price">
            ${(p.price * (p.qty || 1)).toLocaleString()}đ
          </div>
          <small>Số lượng: ${p.qty || 1}</small>
        </div>
      </div>
    `;
  });

  totalBox.innerHTML = "Tổng tiền: " + total.toLocaleString() + "đ";
}

function placeOrder() {
  if (cart.length === 0) {
    alert("Giỏ hàng trống!");
    return;
  }

  alert("Đặt hàng thành công 🎉");

  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

render();
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.item{
  display:flex;
  gap:10px;
  border-bottom:1px solid #eee;
  padding:10px 0;
}

.item img{
  width:70px;
  height:70px;
  object-fit:cover;
  border-radius:8px;
}

.price{
  color:#ee4d2d;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:12px;
  background:#ee4d2d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.btn:hover{
  background:#d84315;
}
</style>
</head>

<body>

<div class="container">

  <h2>💳 Thanh toán đơn hàng</h2>

  <!-- 🧾 SẢN PHẨM -->
  <div class="box" id="cartBox"></div>

  <!-- 👤 THÔNG TIN KHÁCH -->
  <div class="box">
    <h3>📦 Thông tin giao hàng</h3>

    <input id="name" placeholder="Họ tên">
    <input id="phone" placeholder="Số điện thoại">
    <textarea id="address" placeholder="Địa chỉ giao hàng"></textarea>
  </div>

  <!-- 💰 THANH TOÁN -->
  <div class="box">
    <h3>💰 Phương thức thanh toán</h3>

    <select id="payment">
      <option value="cod">Thanh toán khi nhận hàng (COD)</option>
      <option value="bank">Chuyển khoản ngân hàng</option>
    </select>
  </div>

  <button class="btn" onclick="placeOrder()">
    🛒 Đặt hàng ngay
  </button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "Giỏ hàng trống";
    return;
  }

  let total = 0;

  cart.forEach(p=>{
    total += p.price * (p.qty || 1);

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        <div>
          <b>${p.name}</b><br>
          <span class="price">${(p.price*(p.qty||1)).toLocaleString()}đ</span><br>
          <small>Số lượng: ${p.qty || 1}</small>
        </div>
      </div>
    `;
  });

  box.innerHTML += `<h3>Tổng: ${total.toLocaleString()}đ</h3>`;
}

function placeOrder(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const payment = document.getElementById("payment").value;

  if(!name || !phone || !address){
    alert("Vui lòng nhập đầy đủ thông tin!");
    return;
  }

  alert(
    "Đặt hàng thành công 🎉\n" +
    "Tên: " + name + "\n" +
    "SĐT: " + phone + "\n" +
    "Thanh toán: " + payment
  );

  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

renderCart();
</script>
<link rel="stylesheet" href="stylecheckuot.css">
</body>
</html>
